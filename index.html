<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulario de Retorno - ANAM</title>

<style>
body { font-family: 'Segoe UI', Arial, sans-serif; background:#f1f1f1; padding:20px; }

.container {
    background:white;
    padding:30px;
    max-width:800px;
    margin:auto;
    border-radius:8px;
    box-shadow:0 0 20px rgba(0,0,0,0.08);
    border-top:8px solid #6A0F49;
}

.header { text-align:center; margin-bottom:20px; }
.header h2 { color:#6A0F49; }

.info {
    background:#f7f7f7;
    padding:12px;
    border-left:4px solid #6A0F49;
    margin-bottom:20px;
}

label { font-weight:600; }

select, textarea, input {
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:18px;
    border-radius:4px;
    border:1px solid #ccc;
    box-sizing:border-box;
}

button {
    background:#6A0F49;
    color:white;
    padding:12px;
    border:none;
    width:100%;
    cursor:pointer;
    font-size:16px;
    border-radius:4px;
}

button:hover { background:#4e0b36; }

.hidden { display:none; }

/* Modal */
.modal {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.4);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:1000;
}

.modal-content {
    background:white;
    padding:25px;
    border-radius:8px;
    width:300px;
    text-align:center;
}

.modal-content button { margin-bottom:10px; }

.cancelar { background:#999; }
</style>
</head>

<body>

<div class="container">
<div class="header">
<h2>Formulario de Retornos</h2>
</div>

<div class="info">
<strong>Folio:</strong> <span id="folio"></span><br>
<strong>Fecha y Hora:</strong> <span id="fechaHora"></span>
</div>

<form id="formRetorno">

<label>Nombre del Operador:</label>
<input type="text" id="operador" required>

<label>Operación:</label>
<select id="operacion" required>
<option value="">-- Seleccione --</option>
<option value="IMPORTACIÓN">Importación</option>
<option value="EXPORTACIÓN">Exportación</option>
</select>

<label>Tipo de Retorno:</label>
<select id="tipo" required>
<option value="">-- Seleccione --</option>
<option>Retorno Para Nueva Exploración</option>
<option>Retorno Fuera De Horario</option>
<option>Retorno Sin Servicio Extraordinario</option>
<option>Retorno Por Equivocación de Carril</option>
<option>Solicitud de Revisión De Mercancía Sobre-Dimensionada</option>
</select>

<label>Placas:</label>
<textarea id="placas" required></textarea>

<div id="mercanciaDiv" class="hidden">
<label>Mercancía:</label>
<textarea id="mercancia"></textarea>
</div>

<button type="submit">Generar Correo de Retorno</button>

</form>
</div>

<!-- MODAL -->
<div id="modalEnvio" class="modal hidden">
<div class="modal-content">
<h3>¿Cómo desea enviar el correo?</h3>
<button onclick="enviarCorreo('web')">🌐 Outlook Web</button>
<button onclick="enviarCorreo('app')">📱 Aplicación</button>
<button class="cancelar" onclick="cerrarModal()">Cancelar</button>
</div>
</div>

<script>

function actualizarFechaHora(){
document.getElementById("fechaHora").textContent = new Date().toLocaleString();
}
setInterval(actualizarFechaHora,1000);
actualizarFechaHora();

function inicializarFolio(){
const hoy=new Date();
const base=hoy.getFullYear().toString()
+("0"+(hoy.getMonth()+1)).slice(-2)
+("0"+hoy.getDate()).slice(-2);

let contador=localStorage.getItem("contador_"+base)||0;

document.getElementById("folio").textContent=
"RET-"+base+"-"+String(parseInt(contador)+1).padStart(3,'0');
}

function generarFolio(){
const hoy=new Date();
const base=hoy.getFullYear().toString()
+("0"+(hoy.getMonth()+1)).slice(-2)
+("0"+hoy.getDate()).slice(-2);

let contador=parseInt(localStorage.getItem("contador_"+base)||0)+1;
localStorage.setItem("contador_"+base,contador);

return "RET-"+base+"-"+String(contador).padStart(3,'0');
}

inicializarFolio();

document.getElementById("tipo").addEventListener("change",function(){
document.getElementById("mercanciaDiv")
.classList.toggle("hidden",
this.value!=="Solicitud de Revisión De Mercancía Sobre-Dimensionada");
});

/* 🔠 Convertir placas automáticamente a MAYÚSCULAS */
document.getElementById("placas").addEventListener("input", function(){
this.value = this.value.toUpperCase();
});

let datosTemporales={};

document.getElementById("formRetorno").addEventListener("submit",function(e){
e.preventDefault();

datosTemporales.operador=document.getElementById("operador").value.trim();
datosTemporales.operacion=document.getElementById("operacion").value;
datosTemporales.tipo=document.getElementById("tipo").value;
datosTemporales.placas=document.getElementById("placas").value.trim()
.replace(/,/g,'\n')
.replace(/\s+/g,'\n');
datosTemporales.mercancia=document.getElementById("mercancia").value.trim();

document.getElementById("modalEnvio").classList.remove("hidden");
});

function enviarCorreo(metodo){

const folio=generarFolio(); // 🔒 Se genera SOLO aquí
const fecha=new Date().toLocaleString();

let cuerpo=`FOLIO: ${folio}
Fecha: ${fecha}
Operador: ${datosTemporales.operador}
Operación: ${datosTemporales.operacion}

Tipo: ${datosTemporales.tipo}

Placas:
${datosTemporales.placas}`;

if(datosTemporales.mercancia){
cuerpo+=`\n\nMercancía:\n${datosTemporales.mercancia}`;
}

const destinatarios="jorge.silva@anam.gob.mx";
const asunto=`${datosTemporales.operacion} - ${datosTemporales.tipo}`;

let enlace;

if(metodo==="web"){
enlace=`https://outlook.office.com/mail/deeplink/compose?to=${encodeURIComponent(destinatarios)}&subject=${encodeURIComponent(asunto)}&body=${encodeURIComponent(cuerpo)}`;
}else{
enlace=`mailto:${destinatarios}?subject=${encodeURIComponent(asunto)}&body=${encodeURIComponent(cuerpo)}`;
}

window.location.href=enlace;

cerrarModal();
document.getElementById("formRetorno").reset();
inicializarFolio();
}

function cerrarModal(){
document.getElementById("modalEnvio").classList.add("hidden");
}

</script>

</body>
</html>
