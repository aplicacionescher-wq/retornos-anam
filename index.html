<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulario de Retorno - ANAM</title>

<style>
body { font-family: 'Segoe UI', Arial, sans-serif; background:#f1f1f1; padding:20px; }

.container {
    background:white;
    padding:30px;
    max-width:900px;
    margin:auto;
    border-radius:8px;
    box-shadow:0 0 20px rgba(0,0,0,0.08);
    border-top:8px solid #6A0F49;
}

.header { text-align:center; margin-bottom:20px; }
.header h2 { color:#6A0F49; }

.info {
    background:#f7f7f7;
    padding:12px;
    border-left:4px solid #6A0F49;
    margin-bottom:20px;
}

label { font-weight:600; }

select, textarea, input {
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:18px;
    border-radius:4px;
    border:1px solid #ccc;
}

button {
    background:#6A0F49;
    color:white;
    padding:12px;
    border:none;
    width:100%;
    cursor:pointer;
    font-size:16px;
    border-radius:4px;
}

button:hover { background:#4e0b36; }

.hidden { display:none; }

/* Modal */
.modal {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.4);
    display:flex;
    justify-content:center;
    align-items:center;
}

.modal-content {
    background:white;
    padding:25px;
    border-radius:8px;
    width:300px;
    text-align:center;
}

.modal-content button { margin-bottom:10px; }

.cancelar { background:#999; }

/* Historial */
.historial {
    margin-top:40px;
}

table {
    width:100%;
    border-collapse:collapse;
    font-size:14px;
}

th, td {
    border:1px solid #ddd;
    padding:8px;
    text-align:left;
}

th {
    background:#6A0F49;
    color:white;
}

.btn-limpiar {
    background:#999;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="container">
<div class="header">
<h2>Formulario de Retornos</h2>
</div>

<div class="info">
<strong>Folio:</strong> <span id="folio"></span><br>
<strong>Fecha y Hora:</strong> <span id="fechaHora"></span>
</div>

<form id="formRetorno">

<label>Nombre del Operador:</label>
<input type="text" id="operador" required>

<label>Operación:</label>
<select id="operacion" required>
<option value="">-- Seleccione --</option>
<option value="IMPORTACIÓN">Importación</option>
<option value="EXPORTACIÓN">Exportación</option>
</select>

<label>Tipo de Retorno:</label>
<select id="tipo" required>
<option value="">-- Seleccione --</option>
<option>Retorno Para Nueva Exploración</option>
<option>Retorno Fuera De Horario</option>
<option>Retorno Sin Servicio Extraordinario</option>
<option>Retorno Por Equivocación de Carril</option>
<option>Solicitud de Revisión De Mercancía Sobre-Dimensionada</option>
</select>

<label>Placas:</label>
<textarea id="placas" required></textarea>

<div id="mercanciaDiv" class="hidden">
<label>Mercancía:</label>
<textarea id="mercancia"></textarea>
</div>

<button type="submit">Generar Correo de Retorno</button>
</form>

<!-- HISTORIAL -->
<div class="historial">
<h3>Historial de Folios Generados</h3>
<table>
<thead>
<tr>
<th>Folio</th>
<th>Fecha</th>
<th>Operador</th>
<th>Operación</th>
<th>Tipo</th>
<th>Placas</th>
</tr>
</thead>
<tbody id="tablaHistorial"></tbody>
</table>

<button class="btn-limpiar" onclick="limpiarHistorial()">Limpiar Historial</button>
</div>

</div>

<!-- MODAL -->
<div id="modalEnvio" class="modal hidden">
<div class="modal-content">
<h3>¿Cómo desea enviar el correo?</h3>
<button onclick="enviarCorreo('web')">🌐 Outlook Web</button>
<button onclick="enviarCorreo('app')">📱 Aplicación</button>
<button class="cancelar" onclick="cerrarModal()">Cancelar</button>
</div>
</div>

<script>

function actualizarFechaHora(){
document.getElementById("fechaHora").textContent = new Date().toLocaleString();
}
setInterval(actualizarFechaHora,1000);
actualizarFechaHora();

function inicializarFolio(){
const hoy=new Date();
const base=hoy.getFullYear().toString()+("0"+(hoy.getMonth()+1)).slice(-2)+("0"+hoy.getDate()).slice(-2);
let contador=localStorage.getItem("contador_"+base)||0;
document.getElementById("folio").textContent="RET-"+base+"-"+String(parseInt(contador)+1).padStart(3,'0');
}

function generarFolio(){
const hoy=new Date();
const base=hoy.getFullYear().toString()+("0"+(hoy.getMonth()+1)).slice(-2)+("0"+hoy.getDate()).slice(-2);
let contador=parseInt(localStorage.getItem("contador_"+base)||0)+1;
localStorage.setItem("contador_"+base,contador);
return "RET-"+base+"-"+String(contador).padStart(3,'0');
}

inicializarFolio();

document.getElementById("tipo").addEventListener("change",function(){
document.getElementById("mercanciaDiv")
.classList.toggle("hidden",this.value!=="Solicitud de Revisión De Mercancía Sobre-Dimensionada");
});

let datosCorreo={};
let registroActual={};

document.getElementById("formRetorno").addEventListener("submit",function(e){
e.preventDefault();

const operador=document.getElementById("operador").value.trim();
const operacion=document.getElementById("operacion").value;
const tipo=document.getElementById("tipo").value;
const placas=document.getElementById("placas").value.trim();
const mercancia=document.getElementById("mercancia").value.trim();

const folio=generarFolio();
const fecha=new Date().toLocaleString();

let cuerpo=`FOLIO: ${folio}
Fecha: ${fecha}
Operador: ${operador}
Operación: ${operacion}

Tipo: ${tipo}

Placas:
${placas}`;

if(mercancia){
cuerpo+=`\n\nMercancía:\n${mercancia}`;
}

const destinatarios="jorge.silva@anam.gob.mx";
const asunto=`${operacion} - ${tipo}`;

datosCorreo.web=`https://outlook.office.com/mail/deeplink/compose?to=${encodeURIComponent(destinatarios)}&subject=${encodeURIComponent(asunto)}&body=${encodeURIComponent(cuerpo)}`;
datosCorreo.app=`mailto:${destinatarios}?subject=${encodeURIComponent(asunto)}&body=${encodeURIComponent(cuerpo)}`;

registroActual={folio,fecha,operador,operacion,tipo,placas};

document.getElementById("modalEnvio").classList.remove("hidden");
});

function enviarCorreo(tipo){
if(tipo==="web"){
window.location.href=datosCorreo.web;
}else{
window.location.href=datosCorreo.app;
}

guardarRegistro(registroActual);
cerrarModal();
document.getElementById("formRetorno").reset();
inicializarFolio();
}

function cerrarModal(){
document.getElementById("modalEnvio").classList.add("hidden");
}

function guardarRegistro(reg){
let historial=JSON.parse(localStorage.getItem("historialRetornos"))||[];
historial.unshift(reg);
localStorage.setItem("historialRetornos",JSON.stringify(historial));
cargarHistorial();
}

function cargarHistorial(){
let historial=JSON.parse(localStorage.getItem("historialRetornos"))||[];
let tabla=document.getElementById("tablaHistorial");
tabla.innerHTML="";
historial.forEach(r=>{
tabla.innerHTML+=`<tr>
<td>${r.folio}</td>
<td>${r.fecha}</td>
<td>${r.operador}</td>
<td>${r.operacion}</td>
<td>${r.tipo}</td>
<td>${r.placas}</td>
</tr>`;
});
}

function limpiarHistorial(){
if(confirm("¿Desea eliminar todo el historial?")){
localStorage.removeItem("historialRetornos");
cargarHistorial();
}
}

cargarHistorial();

</script>

</body>
</html>
