<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Retorno - ANAM</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6A0F49">
    
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f1f1f1; padding: 20px; }
        .container { background: white; padding: 30px; max-width: 800px; margin: auto; border-radius: 8px; box-shadow: 0 0 20px rgba(0,0,0,0.08); border-top: 8px solid #6A0F49; }
        .header { text-align: center; margin-bottom: 20px; }
        .header img { max-height: 80px; }
        .header h2 { color: #6A0F49; margin-top: 10px; }
        .info { background: #f7f7f7; padding: 12px; border-left: 4px solid #6A0F49; margin-bottom: 20px; }
        label { font-weight: 600; color: #333; }
        select, textarea, input { width: 100%; padding: 10px; margin-top: 5px; margin-bottom: 18px; border-radius: 4px; border: 1px solid #ccc; box-sizing: border-box; }
        
        /* Estilos del Modal de Selección */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); }
        .modal-content { background-color: white; margin: 20% auto; padding: 25px; border-radius: 8px; width: 80%; max-width: 400px; text-align: center; }
        .btn-option { background-color: #6A0F49; color: white; padding: 15px; border: none; width: 100%; cursor: pointer; font-size: 16px; border-radius: 4px; margin-top: 10px; }
        .btn-secondary { background-color: #0078d4; } /* Azul Outlook */
        
        button#mainSubmit { background-color: #6A0F49; color: white; padding: 12px; border: none; width: 100%; cursor: pointer; font-size: 16px; border-radius: 4px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="logo.png" alt="Logo ANAM">
        <h2>Formulario Institucional de Retorno</h2>
    </div>

    <div class="info">
        <strong>Folio:</strong> <span id="folio"></span><br>
        <strong>Fecha y Hora:</strong> <span id="fechaHora"></span>
    </div>

    <form id="formRetorno">
        <label>Nombre del Operador en Turno:</label>
        <input type="text" id="operador" placeholder="Nombre completo" required>

        <label>Seleccione una opción:</label>
        <select id="tipo" required>
            <option value="">-- Seleccione --</option>
            <option>Retorno Para Nueva Exploración</option>
            <option>Retorno Fuera De Horario</option>
            <option>Retorno Sin Servicio Extraordinario</option>
            <option>Retorno Por Equivocación de Carril</option>
            <option>Solicitud de Revisión De Mercancía Sobre-Dimensionada</option>
        </select>

        <label>Placa(s) del vehículo:</label>
        <textarea id="placas" placeholder="Placas separadas por espacio o línea" required></textarea>

        <div id="mercanciaDiv" class="hidden">
            <label>Tipo de Mercancía / Descripción:</label>
            <textarea id="mercancia"></textarea>
        </div>

        <button type="submit" id="mainSubmit">Preparar Envío</button>
    </form>
</div>

<div id="selectorModal" class="modal">
    <div class="modal-content">
        <h3>¿Cómo deseas enviar el correo?</h3>
        <p>Elige el método que tengas configurado en este dispositivo:</p>
        <button class="btn-option" onclick="enviarCorreo('app')">Abrir App de Outlook</button>
        <button class="btn-option btn-secondary" onclick="enviarCorreo('web')">Abrir Outlook Web</button>
        <button style="background:none; border:none; color: gray; margin-top:15px; cursor:pointer;" onclick="cerrarModal()">Cancelar</button>
    </div>
</div>

<script>
    // Registro del Service Worker para PWA
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js'); });
    }

    let datosCorreo = {};

    function inicializarFolio() {
        const hoy = new Date();
        const fechaBase = hoy.getFullYear().toString() + ("0" + (hoy.getMonth()+1)).slice(-2) + ("0" + hoy.getDate()).slice(-2);
        let contador = localStorage.getItem("contador_" + fechaBase) || 0;
        document.getElementById("folio").textContent = "RET-" + fechaBase + "-" + String(parseInt(contador)+1).padStart(3,'0');
    }

    function generarFolio() {
        const hoy = new Date();
        const fechaBase = hoy.getFullYear().toString() + ("0" + (hoy.getMonth()+1)).slice(-2) + ("0" + hoy.getDate()).slice(-2);
        let contador = parseInt(localStorage.getItem("contador_" + fechaBase) || 0) + 1;
        localStorage.setItem("contador_" + fechaBase, contador);
        return "RET-" + fechaBase + "-" + String(contador).padStart(3,'0');
    }

    setInterval(() => { document.getElementById("fechaHora").textContent = new Date().toLocaleString(); }, 1000);
    inicializarFolio();

    document.getElementById("tipo").addEventListener("change", function() {
        document.getElementById("mercanciaDiv").classList.toggle("hidden", this.value !== "Solicitud de Revisión De Mercancía Sobre-Dimensionada");
    });

    document.getElementById("formRetorno").addEventListener("submit", function(e) {
        e.preventDefault();
        
        datosCorreo = {
            operador: document.getElementById("operador").value.trim(),
            tipo: document.getElementById("tipo").value,
            placas: document.getElementById("placas").value.trim().replace(/\s+/g, '\n'),
            mercancia: document.getElementById("mercancia").value.trim(),
            folio: generarFolio(),
            fecha: document.getElementById("fechaHora").textContent
        };

        document.getElementById("selectorModal").style.display = "block";
    });

  function enviarCorreo(metodo) {

    const principal = "jorge.silva@anam.gob.mx";

    const copia = "vyc.altamira@anam.gob.mx,alejandra.munoz@anam.gob.mx,nayely.chavez@anam.gob.mx,miguel.herrera@anam.gob.mx,abraham.gomez@anam.gob.mx,daniel.santosh@anam.gob.mx,christian.monrreal@anam.gob.mx,monica.becerra@anam.gob.mx,anahi.santiago@anam.gob.mx";

    const asunto = `${datosCorreo.tipo} - ${datosCorreo.folio}`;

    const cuerpo = `FOLIO: ${datosCorreo.folio}
Fecha: ${datosCorreo.fecha}
Operador: ${datosCorreo.operador}

Tipo:
${datosCorreo.tipo}

Placas:
${datosCorreo.placas}${datosCorreo.mercancia ? '\n\nMercancía:\n' + datosCorreo.mercancia : ''}`;

    if (metodo === 'app') {

        window.location.href =
        `mailto:${principal}?cc=${encodeURIComponent(copia)}&subject=${encodeURIComponent(asunto)}&body=${encodeURIComponent(cuerpo)}`;

    } else {

        const webLink =
        `https://outlook.office.com/mail/?path=/mail/action/compose&to=${encodeURIComponent(principal)}&cc=${encodeURIComponent(copia)}&subject=${encodeURIComponent(asunto)}&body=${encodeURIComponent(cuerpo)}`;

        window.location.href = webLink;
    }

    cerrarModal();
}
        document.getElementById("formRetorno").reset();
        document.getElementById("mercanciaDiv").classList.add("hidden");
        inicializarFolio();
    }

    function cerrarModal() {
        document.getElementById("selectorModal").style.display = "none";
    }
</script>
</body>
</html>
